<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Encode / Decode</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">

    <!-- HEADER -->
    <header class="header">
      <div class="header-left">
        <div class="app-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
          </svg>
        </div>
        <div class="app-title-group">
          <h1 class="app-title">Encode / Decode</h1>
          <p class="app-subtitle">All-in-one encoding toolkit</p>
        </div>
      </div>
      <div class="header-right">
        <span class="format-count" id="formatCount">— formats</span>
        <button class="dark-toggle" id="darkToggle" title="Toggle dark mode" aria-label="Toggle dark mode">
          <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </header>

    <!-- BODY -->
    <div class="body">

      <!-- SIDEBAR -->
      <aside class="sidebar">
        <div class="sidebar-inner" id="sidebarList"></div>
      </aside>

      <!-- MAIN CONTENT -->
      <main class="main">

        <!-- MODE TOGGLE -->
        <div class="mode-bar">
          <div class="mode-toggle">
            <button class="mode-btn active" id="encodeBtn">Encode</button>
            <button class="mode-btn" id="decodeBtn">Decode</button>
          </div>
        </div>

        <!-- IO PANELS -->
        <div class="io-row">

          <!-- INPUT -->
          <div class="io-panel input-panel">
            <div class="io-top-bar">
              <span class="io-label">INPUT</span>
              <div class="io-top-actions">
                <button class="text-btn" id="copyInputBtn">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                  Copy
                </button>
                <button class="text-btn" id="clearBtn">Clear</button>
              </div>
            </div>
            <div class="textarea-wrap">
              <textarea id="inputText" placeholder="Type or paste text here..." spellcheck="false"></textarea>
            </div>
            <div class="io-bottom-bar">
              <span id="charCount">0 chars</span>
              <span id="byteCount">0 bytes</span>
            </div>
          </div>

          <!-- OUTPUT -->
          <div class="io-panel output-panel">
            <div class="io-top-bar">
              <span class="io-label">OUTPUT</span>
              <div class="io-top-actions">
                <button class="text-btn icon-text-btn" id="swapBtn">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
                  Swap
                </button>
                <button class="text-btn" id="copyBtn">Copy</button>
              </div>
            </div>
            <div class="textarea-wrap">
              <textarea id="outputText" placeholder="Output will appear here..." readonly spellcheck="false"></textarea>
            </div>
            <div class="io-bottom-bar output-bottom">
              <span id="errorMsg" class="error-inline"></span>
              <span id="outputCount"></span>
            </div>
          </div>

        </div>

        <!-- INFO BAR -->
        <div class="info-bar">
          <svg class="info-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
          <p class="info-text"><strong id="infoName"></strong> <span id="infoDesc"></span></p>
        </div>

      </main>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
